<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Notification Test</title>
<style>
  body { font-family: sans-serif; background:#111; color:#fff; padding:24px; text-align:center; }
  button { font-size:18px; padding:16px 24px; margin:10px; border-radius:10px; border:none; background:#7b2fff; color:#fff; }
  #log { text-align:left; background:#222; padding:12px; border-radius:8px; margin-top:20px; font-size:13px; white-space:pre-wrap; }
</style>
</head>
<body>
  <h2>Notification Diagnostic</h2>
  <p>Permission status: <span id="perm-status">checking...</span></p>
  <button onclick="testDirectNotification()">1. Test Direct Notification (no push, no server)</button>
  <button onclick="testSWNotification()">2. Test Via Service Worker</button>
  <div id="log"></div>

  <script>
    const log = (msg) => {
      document.getElementById('log').textContent += msg + '\n';
      console.log(msg);
    };

    document.getElementById('perm-status').textContent = Notification.permission;

    // Test 1: the most basic possible notification, straight from JS,
    // no service worker, no push, no server involved at all.
    // If this doesn't show, the problem is 100% the device/OS blocking
    // notifications from this browser, not your push code.
    function testDirectNotification() {
      log('Attempting direct Notification()...');
      try {
        const n = new Notification('Direct Test', { body: 'If you see this, your device CAN show notifications.' });
        log('Notification() call succeeded, no error thrown.');
        n.onshow = () => log('Notification onshow fired.');
        n.onerror = (e) => log('Notification onerror: ' + JSON.stringify(e));
      } catch (e) {
        log('ERROR: ' + e.message);
      }
    }

    // Test 2: same as your app — showNotification() via the service worker
    // registration, but triggered locally instead of through a real push.
    // If test 1 works but this doesn't, the issue is specific to how the
    // service worker shows notifications.
    async function testSWNotification() {
      log('Attempting service worker showNotification()...');
      try {
        const reg = await navigator.serviceWorker.ready;
        await reg.showNotification('SW Test', { body: 'Service worker notification test.' });
        log('showNotification() resolved without error.');
      } catch (e) {
        log('ERROR: ' + e.message);
      }
    }
  </script>
</body>
</html>
